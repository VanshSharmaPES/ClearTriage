apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cleartriage-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Add cert-manager annotations here for TLS
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: server-service
            port: 
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: client-service
            port: 
              number: 3001
