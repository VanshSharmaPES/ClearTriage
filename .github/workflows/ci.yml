name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Node.js Backend ─────────────────────────────
  server:
    name: Server (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Check syntax (dry run)
        working-directory: server
        run: node --check index.js && node --check routes/patients.js && node --check routes/auth.js

  # ── Python ML Service ───────────────────────────
  ml-service:
    name: ML Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        working-directory: ml-service
        run: flake8 --max-line-length=120 --ignore=E501,W503 main.py data_processing.py train_model.py

  # ── Next.js Frontend ────────────────────────────
  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
